name: crokcode-release

# Build the crokcode CLI on each platform's native runner (native modules do not
# cross-compile) and attach the archives to a GitHub Release. The install
# scripts download these archives.
#
# Trigger by pushing a tag like v0.1.0, or run manually with a tag input.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: tar.gz
          - os: macos-latest
            target: darwin-arm64
            ext: zip
          - os: macos-13
            target: darwin-x64
            ext: zip
          - os: windows-latest
            target: windows-x64
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build crokcode
        working-directory: packages/opencode
        run: bun run script/build.ts --single --skip-install

      - name: Archive (tar.gz)
        if: matrix.ext == 'tar.gz'
        working-directory: packages/opencode/dist/crokcode-${{ matrix.target }}
        run: tar -czf "$GITHUB_WORKSPACE/crokcode-${{ matrix.target }}.tar.gz" bin

      - name: Archive (zip, unix)
        if: matrix.ext == 'zip' && runner.os != 'Windows'
        working-directory: packages/opencode/dist/crokcode-${{ matrix.target }}
        run: zip -r "$GITHUB_WORKSPACE/crokcode-${{ matrix.target }}.zip" bin

      - name: Archive (zip, windows)
        if: runner.os == 'Windows'
        working-directory: packages/opencode/dist/crokcode-${{ matrix.target }}
        run: Compress-Archive -Path bin -DestinationPath "$env:GITHUB_WORKSPACE/crokcode-${{ matrix.target }}.zip"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: crokcode-${{ matrix.target }}.${{ matrix.ext }}
          fail_on_unmatched_files: true
